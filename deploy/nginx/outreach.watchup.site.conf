# nginx reverse proxy for outreach.watchup.site, external port 7070.
# Path-routes /api/* and /health to the Go API (127.0.0.1:8080), everything
# else to the Next.js dashboard (127.0.0.1:3001) — one domain, one port,
# one DNS record, one certbot certificate.
#
# Frontend upstream is 3001, not 3000: port 3000 was already occupied by an
# unrelated Express app on this VPS, so docker-compose.yml's frontend service
# maps to host port 3001 instead (via FRONTEND_HOST_PORT=3001 in .env). If
# you change FRONTEND_HOST_PORT, update the `location /` block below to match.
#
# Install: sudo cp outreach.watchup.site.conf /etc/nginx/sites-available/
#          sudo ln -s /etc/nginx/sites-available/outreach.watchup.site.conf /etc/nginx/sites-enabled/
# Then run certbot (see docs/DEPLOYMENT.md) — it will rewrite the `listen`/
# `ssl_certificate` lines below via --nginx, or you can point them at your
# certonly-obtained cert paths manually if you used --standalone/--webroot.

server {
    listen 7070;
    listen [::]:7070;
    server_name outreach.watchup.site;

    # certbot --nginx will add the TLS block (listen 7070 ssl; ssl_certificate ...)
    # and a redirect from here once the certificate exists. Until then this
    # plain-HTTP block is what certbot's HTTP-01 challenge (via --nginx) uses.

    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Next.js dev/HMR websocket support (harmless in production too).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
